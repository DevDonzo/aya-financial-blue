services:
  aya-ops-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: aya-ops-bot:latest
    environment:
      PORT: "3010"
      AYA_DATA_DIR: /app/data
      BLUE_API_URL: ${BLUE_API_URL:-}
      BLUE_AUTH_TOKEN: ${BLUE_AUTH_TOKEN:-}
      BLUE_CLIENT_ID: ${BLUE_CLIENT_ID:-}
      BLUE_COMPANY_ID: ${BLUE_COMPANY_ID:-}
      BLUE_WORKSPACE_ID: ${BLUE_WORKSPACE_ID:-cmn524yr800e101mh7kn44mhf}
      BLUE_WEBHOOK_PUBLIC_URL: ${BLUE_WEBHOOK_PUBLIC_URL:-}
      BLUE_WEBHOOK_SECRET: ${BLUE_WEBHOOK_SECRET:-}
      LIBRECHAT_MONGO_URI: ${LIBRECHAT_MONGO_URI:-mongodb://mongo:27017/LibreChat}
      LIBRECHAT_MONGO_DB_NAME: ${LIBRECHAT_MONGO_DB_NAME:-LibreChat}
      AUTH_BOOTSTRAP_KEY: ${AUTH_BOOTSTRAP_KEY:-aya-dev-bootstrap-key}
      AUDIT_STDOUT_MODE: ${AUDIT_STDOUT_MODE:-metadata}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3010:3010"
    volumes:
      - aya-ops-bot-data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3010/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  aya-ops-bot-data:

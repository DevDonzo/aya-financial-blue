services:
  aya:
    container_name: aya-ops-bot
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./env/aya.env
    environment:
      PORT: "3010"
      AYA_DATA_DIR: /app/data
      LIBRECHAT_MONGO_URI: mongodb://mongodb:27017/LibreChat
      LIBRECHAT_MONGO_DB_NAME: LibreChat
    ports:
      - "127.0.0.1:3010:3010"
    volumes:
      - aya_data:/app/data
    depends_on:
      - mongodb
    networks:
      - aya_private
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3010/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  librechat:
    container_name: librechat
    build:
      context: ../../../librechat
      dockerfile: Dockerfile.multi
      target: api-build
    restart: unless-stopped
    env_file:
      - ./env/librechat.env
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/LibreChat
      MEILI_HOST: http://meilisearch:7700
      RAG_PORT: ${RAG_PORT:-8000}
      RAG_API_URL: http://rag_api:${RAG_PORT:-8000}
    depends_on:
      - mongodb
      - meilisearch
      - rag_api
      - aya
    ports:
      - "127.0.0.1:3080:3080"
    volumes:
      - ./config/librechat.yaml:/app/librechat.yaml:ro
      - librechat_uploads:/app/uploads
      - librechat_logs:/app/api/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aya_private

  mongodb:
    container_name: aya-chat-mongodb
    image: mongo:8.0.20
    restart: unless-stopped
    command: mongod --noauth
    volumes:
      - librechat_mongo:/data/db
    networks:
      - aya_private

  meilisearch:
    container_name: aya-chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: unless-stopped
    env_file:
      - ./env/librechat.env
    environment:
      MEILI_HOST: http://meilisearch:7700
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - librechat_meili:/meili_data
    networks:
      - aya_private

  vectordb:
    container_name: aya-chat-vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - librechat_pg:/var/lib/postgresql/data
    networks:
      - aya_private

  rag_api:
    container_name: aya-chat-rag
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    restart: unless-stopped
    env_file:
      - ./env/librechat.env
    environment:
      DB_HOST: vectordb
      RAG_PORT: ${RAG_PORT:-8000}
    depends_on:
      - vectordb
    networks:
      - aya_private

networks:
  aya_private:
    driver: bridge

volumes:
  aya_data:
  librechat_mongo:
  librechat_meili:
  librechat_pg:
  librechat_uploads:
  librechat_logs:

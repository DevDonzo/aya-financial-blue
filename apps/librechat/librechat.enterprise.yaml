version: 1.3.6

cache: true

interface:
  customWelcome: |
    Aya Financial Ops Chat

    Ask Aya naturally:
    - what am I working on
    - show comments for John Smith
    - move Sheraz to underwriting
    - create a new lead named john smith phone 4165550123 email john@example.com amount 275000
  fileSearch: false
  privacyPolicy:
    externalUrl: 'https://www.ayafinancial.com/privacy'
    openNewTab: true
  termsOfService:
    externalUrl: 'https://www.ayafinancial.com/terms'
    openNewTab: true
    modalAcceptance: true
    modalTitle: 'Aya Financial Internal Use Terms'
    modalContent: |
      This system is for authorized Aya Financial personnel only.

      Client data, operational data, and internal conversations may be logged,
      reviewed, and retained for security, compliance, and service improvement.

      Do not paste secrets, credentials, or information unrelated to Aya work.
  endpointsMenu: false
  modelSelect: false
  parameters: false
  sidePanel: true
  presets: false
  prompts:
    use: false
    create: false
    share: false
    public: false
  bookmarks: false
  multiConvo: true
  agents:
    use: false
    create: false
    share: false
    public: false
  peoplePicker:
    users: false
    groups: false
    roles: false
  marketplace:
    use: false
  runCode: false
  webSearch: false
  temporaryChatRetention: 168
  mcpServers:
    use: true
    create: false
    share: false
    public: false

registration:
  socialLogins:
    - 'openid'
  allowedDomains:
    - 'ayafinancial.com'

actions:
  allowedDomains:
    - 'librechat.ai'

mcpSettings:
  allowedDomains:
    - 'aya-api'
    - 'aya.internal'
    - 'ops.ayafinancial.com'

modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: 'aya-ops-assistant'
      label: 'Aya Ops Assistant'
      description: 'Use Aya tools for client search, workflow status, comments, stage moves, and admin activity reporting in the Blue workspace exposed through Aya.'
      default: true
      preset:
        endpoint: 'openAI'
        model: 'gpt-4.1-mini'
        instructions: |
          You are Aya Financial's internal operations assistant.

          Speak like an experienced operations coworker helping brokers and staff.
          Assume the user is non-technical unless they explicitly ask a technical question.
          Never mention MCP, tools, functions, function names, JSON, schemas, endpoints, APIs, or internal implementation details unless the user explicitly asks.
          When a user asks what you can do, answer in plain business language with relevant examples, not internal capability names.

          Use `aya_message` as the default Aya tool for normal natural-language requests. Prefer it for ambiguous asks like:
          - show me Hamza
          - what's going on with X
          - comments on this client
          - move this to underwriting
          - what changed today
          Only call a specialist Aya tool directly when the request is already explicit and fully structured for that tool.

          Always prefer Aya tools when the user asks about:
          - clients, records, comments, stages, assignments, or activity
          - what an employee worked on
          - exactly what an employee did, what comments they made, what they moved, or what leads they created
          - what happened across the workspace over a day, week, month, or explicit date range
          - who touched a client, who commented on a file, or what happened on a specific client over time
          - recent comments or context before a call
          - moving a client to another stage
          - adding a note or comment
          - creating a new lead or client

          For signed-in identity questions, use the `aya_get_current_employee` tool instead of answering from memory.
          For ordinary chat requests, do not jump straight to specialist employee/reporting tools if the user only gave a name. Let `aya_message` handle the ambiguity first.
          If the user is not an admin, ambiguous names like `show me Hamza` should be treated as client/file lookups, not employee reporting or employee workload.
          If the user is an admin and says `show me <name>`, treat it as ambiguous between a client and an employee and prefer `aya_message` so Aya can route or clarify.
          For admin questions about one employee's actions, prefer the `aya_get_employee_activity_report` tool only when the user is explicitly asking for exact activity, comments made, client moves, created leads, or a detailed timeline across today, yesterday, this week, last week, this month, last month, or an explicit date range.
          For admin questions about the workspace overall, prefer the `aya_get_workspace_activity_report` tool when the user explicitly asks what happened, who moved clients, who commented, who created leads, or for an activity timeline across those same time ranges.
          For admin questions about a specific client or file, prefer the `aya_get_record_activity_report` tool when the user explicitly asks who touched it, who commented on it, what happened on it, or for a client activity timeline across those same time ranges.

          Do not make up CRM data. Use the Aya tools to look things up.
          Keep responses concise, direct, and operational.
          Present actions and results in normal English, for example:
          - "I can look up a client, show recent comments, add a note, move a file, or create a new lead."
          - not "I can call aya_search_clients_mcp_aya_ops."
          For quick CRM tasks, prefer brief answers over long explanations.
          If the request is ambiguous, ask one short clarifying question instead of guessing.
          If the user asks what they are working on, keep the first answer to the most relevant records instead of dumping a huge list.
          If the user asks about comments, summarize the latest useful comments first.
          For requests like "show me Hamza", "update on X", "comments on X", "what's going on with X", and similar natural phrasing, prefer `aya_message` instead of a low-level direct tool.
          Treat names, phone numbers, and email addresses in ordinary CRM questions as client identifiers by default, not internal employee lookups.
          Only use employee-focused tools when the user is explicitly asking about staff work, staff activity, or staff assignments.
          If the user asks for comments, status, or an update on an email address, search the CRM client record tied to that email.
          When creating a new lead or client:
          - prefer the `aya_create_client_record` tool over free-form answers
          - extract and pass explicit `firstName` and `lastName` when possible
          - if the employee types the name in lowercase, convert it to normal human name casing
          - keep email addresses lowercase
          - normalize phone numbers when possible
          - normalize obvious amount shorthand like 275k to 275000 when possible
          - do not invent purchase price, down payment, or other missing financial fields
          - if the name split is unclear, ask one short clarifying question
      authType: 'user_provided'
      mcpServers:
        - 'aya_ops'

mcpServers:
  aya_ops:
    type: streamable-http
    url: http://aya-api:3010/mcp
    chatMenu: false
    startup: true
    timeout: 90000
    customUserVars:
      AYA_BLUE_TOKEN_ID:
        title: 'Blue Token ID'
        description: 'Connect your Blue account once by pasting the Token ID from Blue > Profile > API. Aya uses it only for Blue write actions you trigger.'
      AYA_BLUE_TOKEN_SECRET:
        title: 'Blue Token Secret'
        description: 'The matching Blue Token Secret. Stored encrypted by LibreChat and reused only for your attributable Blue write actions.'
    serverInstructions: |
      Aya Ops tools are the approved path for internal workflow lookups and CRM actions. Prefer Aya tools over unsupported free-form answers about internal data. Treat names, phone numbers, and email addresses in ordinary CRM questions as client identifiers by default, not internal employee lookups. Only use employee-focused tools when the user is explicitly asking about staff work, staff activity, or staff assignments. For admin requests about exactly what an employee did, which comments they made, what they moved, what they created, or for an employee activity timeline over today, yesterday, this week, last week, this month, last month, or an explicit date range, prefer the dedicated employee activity report tool. For admin requests about what happened across the workspace over those time ranges, who moved clients, who commented, who created leads, or for a workspace activity timeline, prefer the dedicated workspace activity report tool. For admin requests about a specific client or file, prefer the dedicated record activity report tool when the user asks who touched it, who commented on it, what happened on it, or for a timeline over those same time ranges. For new lead creation, prefer explicit firstName and lastName arguments, normalize human names even if the user typed lowercase, normalize obvious amount shorthand, and ask a short follow-up instead of guessing when the split is ambiguous.
    headers:
      x-aya-employee-email: '{{LIBRECHAT_USER_EMAIL}}'
      x-aya-employee-name: '{{LIBRECHAT_USER_NAME}}'
      x-aya-blue-token-id: '{{AYA_BLUE_TOKEN_ID}}'
      x-aya-blue-token-secret: '{{AYA_BLUE_TOKEN_SECRET}}'
